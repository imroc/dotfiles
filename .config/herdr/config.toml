onboarding = false

[theme]
name = "tokyo-night"

[keys]
prefix = "ctrl+a"
switch_workspace = "super+ctrl+1..9"
previous_workspace = "super+ctrl+p"
next_workspace = "super+ctrl+n"
previous_agent = "super+ctrl+i"
next_agent = "super+ctrl+o"
focus_agent = "prefix+1..9"
previous_tab = "super+ctrl+["
next_tab = "super+ctrl+]"
switch_tab = "ctrl+1..9"
focus_pane_left = "super+ctrl+h"
focus_pane_down = "super+ctrl+j"
focus_pane_up = "super+ctrl+k"
focus_pane_right = "super+ctrl+l"
split_vertical = "super+ctrl+\\"
split_horizontal = "super+ctrl+-"

[experimental]
kitty_graphics = true

[ui]
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false
