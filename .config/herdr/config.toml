onboarding = false

[theme]
name = "tokyo-night"

[keys]
prefix = "ctrl+a"
switch_workspace = "prefix+ctrl+1..9"
previous_workspace = "super+ctrl+k"
next_workspace = "super+ctrl+j"
previous_agent = "shift+alt+p"
next_agent = "shift+alt+n"
focus_agent = "shift+alt+1..9"
switch_tab = "ctrl+1..9"
focus_pane_left = "shift+alt+h"
focus_pane_down = "shift+alt+j"
focus_pane_up = "shift+alt+k"
focus_pane_right = "shift+alt+l"

[experimental]
kitty_graphics = true

[ui]
show_agent_labels_on_pane_borders = true
