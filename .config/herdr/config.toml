onboarding = false

[theme]
name = "tokyo-night"

[keys]
prefix = "ctrl+a"
zoom = ["super+enter", "prefix+z"]
reload_config = "prefix+,"
detach = "prefix+d"
# workspace
switch_workspace = "super+1..9"
previous_workspace = "super+alt+k"
next_workspace = "super+alt+j"
new_workspace = "super+n"
rename_workspace = "prefix+ctrl+w"
# agent
previous_agent = "super+alt+h"
next_agent = "super+alt+l"
focus_agent = "prefix+1..9"
# tab
previous_tab = "super+["
next_tab = "super+]"
switch_tab = "ctrl+1..9"
new_tab = "super+t"
rename_tab = "prefix+t"
# pane
focus_pane_left = "super+h"
focus_pane_down = "super+j"
focus_pane_up = "super+k"
focus_pane_right = "super+l"
close_pane = ["super+w", "prefix+x"]
split_vertical = ["super+\\", "prefix+\\"]
split_horizontal = ["super+-", "prefix+-"]

[experimental]
kitty_graphics = true

[ui]
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-left"

